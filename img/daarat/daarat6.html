<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <!-- Daarat -->
    <div style="max-width: 1440px; margin: 0 auto; padding: 0 10px">
      <div style="display: flex; flex-direction: column; align-items: center">
        <div
          style="
            max-width: 440px;
            display: flex;
            flex-direction: column;
            align-items: start;
          "
        >
          <div
            style="
              width: 100%;
              margin-top: 40px;
              display: flex;
              flex-direction: column;
              align-items: start;
            "
          >
            <h2
              style="
                margin: 0;
                font-size: 20px;
                font-weight: 600;
                line-height: 26px;
                color: #3d3d3d;
                font-family: Robot, sans-serif;
                letter-spacing: -0.43px;
              "
            >
              Дааратты өткөрбөгөн нерселер:
            </h2>
            <p
              style="
                margin-bottom: 0;
                margin-top: 26px;
                font-size: 16px;
                font-weight: normal;
                line-height: 22px;
                letter-spacing: -0.41px;
                color: #3d3d3d;
                font-family: Robot, sans-serif;
              "
            >
              Денеге сууну жетүүсүн тоскон баардык нерселер (эгер ал сууну
              өткөрө турган касиети болсо өткөрөт).
            </p>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
