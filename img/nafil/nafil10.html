<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <!-- Daarat -->
    <div style="max-width: 1440px; margin: 0 auto; padding: 10px 10px">
      <div style="display: flex; flex-direction: column; align-items: center">
        <div
          style="
            max-width: 440px;
            display: flex;
            flex-direction: column;
            align-items: start;
          "
        >
          <div
            style="
              width: 100%;
              margin-top: 40px;
              display: flex;
              flex-direction: column;
              align-items: start;
            "
          >
            <h2
              style="
                margin: 0;
                font-size: 20px;
                font-weight: 600;
                line-height: 26px;
                color: #3d3d3d;
                font-family: Robot, sans-serif;
                letter-spacing: -0.43px;
              "
            >
              ТАСБИХ НАМАЗЫ (Жаратканды даңктоо):
            </h2>
            <p
              style="
                margin: 10px 0;
                font-size: 18px;
                font-weight: 400;
                line-height: 26px;
                color: #e90707;
                font-family: Robot, sans-serif;
                letter-spacing: -0.43px;
              "
            >
              НИЕТ: Ниет кылдым жүзүмдү кыбылага буруп төрт рекет тасбих намазын
              калыс Аллах үчүн окууга.
            </p>
            <p
              style="
                margin: 10px 0;
                font-size: 18px;
                font-weight: 400;
                line-height: 26px;
                color: #3d3d3d;
                font-family: Robot, sans-serif;
                letter-spacing: -0.43px;
              "
            >
              Мусулман баласы тасбих намазын өмүрүндө жок дегенде бир жолу окушу
              абзел. Тасбих намазы төрт рекеттен турат. Аны жеке да, жамаат
              менен да окуса болот.
            </p>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
