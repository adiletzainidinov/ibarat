<!DOCTYPE html>

            display: flex;
            flex-direction: column;
            align-items: start;
          "

          <div
            style="
              width: 100%;
              margin-top: 40px;
              display: flex;
              flex-direction: column;
              align-items: start;
            "
          >
            <p
              style="
                margin: 10px 0;
                font-size: 18px;
                font-weight: 400;
                line-height: 26px;

                font-family: Robot, sans-serif;
                letter-spacing: -0.43px;
              "

              <b>АЖЫЛЫК:</b>
            </p>
            <p
              style="
                margin: 10px 0;
                font-size: 18px;

                line-height: 26px;

                font-family: Robot, sans-serif;
                letter-spacing: -0.43px;
              "

              Тилдик мааниси: улуу ишти ниет кылуу.
            </p>
            <p
              style="
                margin: 10px 0;
                font-size: 18px;
                font-weight: 400;
                line-height: 26px;

                font-family: Robot, sans-serif;
                letter-spacing: -0.43px;

            </p>
            <p
              style="
                margin: 10px 0;
                font-size: 18px;

                line-height: 26px;
                color: #3d3d3d;
                font-family: Robot, sans-serif;
                letter-spacing: -0.43px;
              "
            >
              Ажы амалы балагат жашына жеткен мусулман адамга өмүрүндө бир жолу
              ажылык кылуу парз болот.
            </p>
          </div>

    </div>
