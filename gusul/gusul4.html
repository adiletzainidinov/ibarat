<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <!-- Daarat -->
    <!-- Daarat -->
    <div style="max-width: 1440px; margin: 0 auto; padding: 10px">
      <div style="display: flex; flex-direction: column; align-items: center">
        <!-- Bul jerde daarat aluunun okumdorunun tartibi tizme turundo korsotuldu -->

        <div
          style="
            max-width: 440px;
            display: flex;
            flex-direction: column;
            align-items: start;
          "
        >
          <!-- Гусулду алуу парздары -->
          <div
            style="
              width: 100%;
              display: flex;
              flex-direction: column;
              align-items: start;
              margin-top: 40px;
            "
          >
            <h2
              style="
                margin: 0;
                font-size: 20px;
                font-weight: 600;
                line-height: 26px;
                color: #3d3d3d;
                font-family: Robot, sans-serif;
                letter-spacing: -0.43px;
              "
            >
              Гусулду алуу парздары
            </h2>
            <ul
              style="
                padding: 0;
                margin: 0;
                display: flex;
                flex-direction: column;
                align-items: flex-start;
              "
            >
              <li
                style="
                  list-style: none;
                  margin-bottom: 0;
                  margin-top: 8px;
                  font-size: 16px;
                  font-weight: normal;
                  line-height: 22px;
                  letter-spacing: -0.41px;
                  color: #3d3d3d;
                  font-family: Robot, sans-serif;
                "
              >
                1. Оозго суу алып, чайкоо.
              </li>
              <li
                style="
                  list-style: none;
                  margin-bottom: 0;
                  margin-top: 8px;
                  font-size: 16px;
                  font-weight: normal;
                  line-height: 22px;
                  letter-spacing: -0.41px;
                  color: #3d3d3d;
                  font-family: Robot, sans-serif;
                "
              >
                2. Мурунду жуу (мурунга суу алып, даарат алгандай жуу).
              </li>
              <li
                style="
                  list-style: none;
                  margin-bottom: 0;
                  margin-top: 8px;
                  font-size: 16px;
                  font-weight: normal;
                  line-height: 22px;
                  letter-spacing: -0.41px;
                  color: #3d3d3d;
                  font-family: Robot, sans-serif;
                "
              >
                3. Дененин бардык бөлүгүнө суу жеткирүү.
              </li>
            </ul>
          </div>

          <!-- Далил: Маида сүрөөсү, 6-аят: -->

          <div
            style="
              display: flex;
              flex-direction: column;
              width: 100%;
              margin: 30px 0;
            "
          >
            <h2
              style="
                margin: 10px 0;
                font-size: 18px;
                font-weight: 400;
                line-height: 26px;
                color: #3d3d3d;
                font-family: Robot, sans-serif;
                letter-spacing: -0.43px;
              "
            >
              <b>Далил:</b> Маида сүрөөсү, 6-аят.
            </h2>
            <p
              style="
                margin: 10px 0;
                font-size: 18px;
                font-weight: 400;
                line-height: 26px;
                color: #3d3d3d;
                font-family: Robot, sans-serif;
                letter-spacing: -0.43px;
              "
            >
              وِإْنكُْنتُْم جنًُبافَا طَّهُروا
            </p>
            <p
              style="
                margin: 10px 0;
                font-size: 18px;
                font-weight: 400;
                line-height: 26px;
                color: #0db50a;
                font-family: Robot, sans-serif;
                letter-spacing: -0.43px;
                font-family: cursive;
              "
            >
              <em>Эгер жунуп (булганган) болсоңор - жуунгула! </em>
            </p>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
