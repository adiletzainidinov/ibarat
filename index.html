<!DOCTYPE html>
<html lang="ky">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Намаз сүрөт менен</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Arial, sans-serif;
      background: linear-gradient(180deg, #f6fbf9 0%, #eef7f4 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .home-card {
      width: 100%;
      max-width: 440px;
      background: #ffffff;
      border-radius: 32px;
      padding: 32px 24px;
      text-align: center;
      box-shadow: 0 18px 45px rgba(2, 94, 79, 0.12);
    }

    .home-badge {
      width: 64px;
      height: 64px;
      border-radius: 20px;
      background: rgba(2, 94, 79, 0.1);
      color: #025e4f;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 18px;
      font-size: 28px;
    }

    .home-title {
      margin: 0;
      font-size: 28px;
      line-height: 1.2;
      color: #10231f;
      font-weight: 700;
    }

    .home-text {
      margin: 14px 0 26px;
      font-size: 16px;
      line-height: 1.55;
      color: #52635f;
    }

    .home-actions {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .home-button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      min-height: 54px;
      padding: 14px 20px;
      border-radius: 18px;
      background: #025e4f;
      color: #ffffff;
      text-decoration: none;
      font-size: 17px;
      font-weight: 700;
      box-shadow: 0 12px 25px rgba(2, 94, 79, 0.22);
      transition:
        transform 0.2s ease,
        background-color 0.2s ease,
        box-shadow 0.2s ease;
    }

    .home-button:hover {
      background: #014c40;
      transform: translateY(-2px);
      box-shadow: 0 16px 30px rgba(2, 94, 79, 0.28);
    }

    .home-button:active {
      transform: translateY(0);
    }

    .home-button.secondary {
      background: #ffffff;
      color: #025e4f;
      border: 1px solid rgba(2, 94, 79, 0.18);
      box-shadow: none;
    }

    .home-button.secondary:hover {
      background: #f3faf7;
      color: #014c40;
      box-shadow: none;
    }

    @media (max-width: 480px) {
      .home-card {
        padding: 28px 20px;
        border-radius: 28px;
      }

      .home-title {
        font-size: 24px;
      }

      .home-text {
        font-size: 15px;
      }
    }
  </style>
</head>
<body>
  <div class="home-card">
    <div class="home-badge">☪</div>
    <h1 class="home-title">Аялдар үчүн намаз</h1>
    <p class="home-text">
      Намаздарды сүрөт жана аудио менен этап-этабы менен үйрөнүү
    </p>
    <div class="home-actions">
      <a
        class="home-button"
        href="./namaz-surot-menen/ayal-namazy/bagumdat/bagumdatSunnot.html"
      >
        Багымдат — 2 рекет сүннөт
      </a>
      <a
        class="home-button secondary"
        href="./namaz-surot-menen/ayal-namazy/bagumdat/bagumdatFarz.html"
      >
        Багымдат — 2 рекет фарз
      </a>
      <a
        class="home-button secondary"
        href="./namaz-surot-menen/ayal-namazy/beshim/beshimTortReketSunnot.html"
      >
        Бешим — 4 рекет сүннөт
      </a>
      <a
        class="home-button secondary"
        href="./namaz-surot-menen/ayal-namazy/sham/shamYshReketFarz.html"
      >
        Шам — 3 рекет фарз
      </a>
    </div>
  </div>
</body>
</html>
